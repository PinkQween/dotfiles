$LMB=mouse:272
$RMB=mouse:273

#
#  The design choice for Nilla is to keep that vanilla
#  Hyprland feel keybind-wise. 
#

bind=SUPER, Q, exec, $terminal
bind=SUPER, W, killactive,
bind=SUPER SHIFT, M, exit,
bind=SUPER, F, exec, $file_manager
bind=SUPER, R, exec, $menu
bind=SUPER, C, exec, $calculator
bind=SUPER SHIFT, F, exec, $rofi_filemanager
bind=SUPER, D, exec, $discord
bind=SUPER, Z, exec, $browser
bind=SUPER, A, exec, apple-music

#
#  Shift your focus using TAB and the Arrow Keys.
#
bind=SUPER, left, movefocus, l
bind=SUPER, right, movefocus, r
bind=SUPER, up, movefocus, u
bind=SUPER, down, movefocus, d

bind=SUPER, Tab, cyclenext

bind=SUPER SHIFT, left, movewindow, l 
bind=SUPER SHIFT, right, movewindow, r
bind=SUPER SHIFT, up, movewindow, u
bind=SUPER SHIFT, down, movewindow, d

#
#  Window and Workspace management
#
bind=SUPER, V, togglefloating,
bind=SUPER SHIFT, Z, layoutmsg, togglesplit
bindm=SUPER, $RMB, resizewindow
bindm=SUPER, $LMB, movewindow

# Screenshot bindings
bind=SUPER, S, exec, hyprshot -m region
bind=SUPER, M, exec, sh -c "chmod +x $HOME/.config/hypr/keybinds/toggle-hidden.sh; $HOME/.config/hypr/keybinds/toggle-hidden.sh"

bind=SUPER, 0, workspace, 10
bind=SUPER, 1, workspace, 1
bind=SUPER, 2, workspace, 2
bind=SUPER, 3, workspace, 3
bind=SUPER, 4, workspace, 4
bind=SUPER, 5, workspace, 5
bind=SUPER, 6, workspace, 6
bind=SUPER, 7, workspace, 7
bind=SUPER, 8, workspace, 8
bind=SUPER, 9, workspace, 9

bind=SUPER SHIFT, 0, movetoworkspace, 10
bind=SUPER SHIFT, 1, movetoworkspace, 1
bind=SUPER SHIFT, 2, movetoworkspace, 2
bind=SUPER SHIFT, 3, movetoworkspace, 3
bind=SUPER SHIFT, 4, movetoworkspace, 4
bind=SUPER SHIFT, 5, movetoworkspace, 6
bind=SUPER SHIFT, 6, movetoworkspace, 6
bind=SUPER SHIFT, 7, movetoworkspace, 7
bind=SUPER SHIFT, 8, movetoworkspace, 8
bind=SUPER SHIFT, 9, movetoworkspace, 9

# Screenshot variants
bind=SUPER SHIFT, S, exec, hyprshot -m window
bind=SUPER CTRL, S, exec, hyprshot -m output

#
#  Binds for users with trackpads
#
gesture=3, horizontal, workspace
gesture=3, vertical, special, hidden



# Keyboard volume keys
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle

# Keyboard media keys
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioStop, exec, playerctl stop
