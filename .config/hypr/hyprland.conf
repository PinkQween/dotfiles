#
#  AeroGlass Modern Hyprland Config
#  Inspired by Apple's Liquid Glass & end-4
#

# Environment
env = XCURSOR_SIZE, 24
env = WLR_NO_HARDWARE_CURSORS, 1
env = QT_QPA_PLATFORMTHEME, kde
env = QT_STYLE_OVERRIDE, breeze

# Sourcing
source = ./programs.conf
source = ./keybinds/binds.conf
source = ./keybinds/debug-binds.conf
source = ./displays.conf
source = ./windows.conf

# Autostart
exec-once = waybar --config ~/.config/hypr-aeroglass/waybar/config.jsonc --style ~/.config/hypr-aeroglass/waybar/style.css
exec-once = waypaper --restore
exec-once = wayvnc
exec-once = dunst
exec-once = xwaylandvideobridge

# General
general {
    gaps_in = 8
    gaps_out = 16
    border_size = 3
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

# Decoration
decoration {
    rounding = 12
    
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# Animations (Modern & Fast)
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = linear, 0.0, 0.0, 1.0, 1.0
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = slow, 0, 0.85, 0.3, 1

    animation = windows, 1, 7, wind, slide
    animation = windowsIn, 1, 7, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 7, wind, slide
    animation = border, 1, 10, linear
    animation = borderangle, 1, 30, linear, loop
    animation = fade, 1, 7, slow
    animation = workspaces, 1, 6, wind
}

# Dwindle
dwindle {
    pseudo = true
    preserve_split = true
}

# Master
master {
    new_status = master
}

# Gestures
gestures {
    workspace_swipe = true
}

# Misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    animate_manual_resizes = true
}
